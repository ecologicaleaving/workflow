# Template canonico: GitHub Actions — Build & Deploy Flutter APK
# Versione: 2026-03-08
#
# ISTRUZIONI:
#   1. Copia questo file in .github/workflows/build-apk.yml del tuo repo
#   2. Sostituisci ogni occorrenza di __REPO_NAME__ con il nome del repo (es: finn, beachref)
#   3. Se l'app usa Supabase, mantieni i --dart-define; altrimenti rimuovili
#   4. Aggiungi i secrets GitHub (vedi sezione "Secrets richiesti" sotto)
#
# SECRETS RICHIESTI:
#   VPS_SSH_KEY, VPS_HOST, VPS_USER
#   SUPABASE_URL, SUPABASE_ANON_KEY  (opzionali)
#
# REGOLE FONDAMENTALI:
#   - Trigger: SOLO feature/**, fix/** e pull_request
#     → MAI "branches: ['**']" → genera build su ogni commit di infra/chore
#   - Flutter: SOLO "channel: stable" → evita breaking changes
#   - APK build: usa "|| true" + "find" per sicurezza
#   - Notifica: include SEMPRE issue # e PR # per chiarezza a Davide

name: Build & Deploy APK

on:
  pull_request:
    branches: ['**']
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    name: Build APK & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Extract version & branch info
        id: info
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          ISSUE_NUM=$(echo "$BRANCH" | grep -oP 'issue-\K\d+' || echo "")

          if [ -n "$PR_NUMBER" ]; then
            APK_NAME="__REPO_NAME__-pr${PR_NUMBER}-${SHORT}.apk"
          else
            APK_NAME="__REPO_NAME__-${BRANCH//\//-}-${SHORT}.apk"
          fi

          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "branch=$BRANCH"       >> $GITHUB_OUTPUT
          echo "short=$SHORT"         >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME"   >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Build APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g"
        run: |
          flutter build apk --release --target-platform android-arm64 || true

      - name: Find & rename APK
        id: apk
        run: |
          APK_PATH=$(find build -name "*.apk" 2>/dev/null | grep -v "intermediates\|test" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ Nessun APK trovato"
            exit 1
          fi
          cp "$APK_PATH" "${{ steps.info.outputs.apk_name }}"
          echo "APK: ${{ steps.info.outputs.apk_name }}"

      - name: Deploy APK su app-hub
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /var/www/app-hub/downloads/test"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ steps.info.outputs.apk_name }}" \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/app-hub/downloads/test/

      - name: Fetch issue title
        id: issue
        if: steps.info.outputs.issue_num != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM="${{ steps.info.outputs.issue_num }}"
          TITLE=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json title --jq '.title' 2>/dev/null || echo "")
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Comment PR with APK link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const apkName = '${{ steps.info.outputs.apk_name }}';
            const url = `https://apps.8020solutions.org/downloads/test/${apkName}`;
            const issueNum = '${{ steps.info.outputs.issue_num }}';
            const issueTitle = '${{ steps.issue.outputs.title }}';
            const repo = context.repo;
            const issueRef = issueNum
              ? `\n\n📋 **Issue:** [#${issueNum} — ${issueTitle}](https://github.com/${repo.owner}/${repo.repo}/issues/${issueNum})`
              : '';
            await github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: context.issue.number,
              body: `📲 **APK pronto per il test!**\n\n🔗 [Scarica ${apkName}](${url})${issueRef}`
            });

      - name: Notify Ciccio
        if: success()
        run: |
          ISSUE_NUM="${{ steps.info.outputs.issue_num }}"
          PR_NUM="${{ steps.info.outputs.pr_number }}"
          SHORT="${{ steps.info.outputs.short }}"
          BRANCH="${{ steps.info.outputs.branch }}"
          REPO="${{ github.repository }}"
          APK_URL="https://apps.8020solutions.org/downloads/test/${{ steps.info.outputs.apk_name }}"

          if [ -n "$PR_NUM" ] && [ -n "$ISSUE_NUM" ]; then
            CONTEXT="Issue #${ISSUE_NUM} — PR #${PR_NUM}\nhttps://github.com/${REPO}/issues/${ISSUE_NUM}"
          elif [ -n "$PR_NUM" ]; then
            CONTEXT="PR #${PR_NUM}\nhttps://github.com/${REPO}/pull/${PR_NUM}"
          elif [ -n "$ISSUE_NUM" ]; then
            CONTEXT="Issue #${ISSUE_NUM}\nhttps://github.com/${REPO}/issues/${ISSUE_NUM}"
          else
            CONTEXT="Branch: ${BRANCH}"
          fi

          MSG="✅ __REPO_NAME__ — APK pronto (${SHORT})\n${CONTEXT}\n📲 ${APK_URL}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "ciccio-notify '${MSG}'" || true

      - name: Notify Ciccio (build fallita)
        if: failure()
        run: |
          SHORT="${{ steps.info.outputs.short }}"
          BRANCH="${{ steps.info.outputs.branch }}"
          MSG="❌ __REPO_NAME__ — build fallita (${SHORT})\nBranch: ${BRANCH}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "ciccio-notify '${MSG}'" || true
