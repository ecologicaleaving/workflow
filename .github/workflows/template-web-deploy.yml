name: Build & Deploy

on:
  push:
    branches: ['**']
  delete:
    branches: ['**']

env:
  NODE_VERSION: '22'

jobs:
  cleanup:
    if: github.event_name == 'delete'
    name: Cleanup branch environment
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Remove branch webroot
        run: |
          SLUG=$(echo "${{ github.event.ref }}" | sed 's|/|-|g' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "rm -rf /var/www/test-maestro/b/${SLUG} && echo 'Rimosso ambiente ${SLUG}'"
      - name: Notify
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "ciccio-notify '🗑️ maestroweb / ${{ github.event.ref }} — ambiente rimosso'" \
            || true

  build-and-deploy:
    if: github.event_name == 'push'
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deploy target
        id: target
        run: |
          BRANCH="${{ github.ref_name }}"
          SLUG=$(echo "$BRANCH" | sed 's|/|-|g' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
          if [ "$BRANCH" = "master" ] || [ "$BRANCH" = "main" ]; then
            echo "webroot=/var/www/maestroweb"           >> $GITHUB_OUTPUT
            echo "base_path="                            >> $GITHUB_OUTPUT
            echo "url=https://maestro.8020solutions.org" >> $GITHUB_OUTPUT
          else
            echo "webroot=/var/www/test-maestro/b/${SLUG}"                          >> $GITHUB_OUTPUT
            echo "base_path=/b/${SLUG}"                                             >> $GITHUB_OUTPUT
            echo "url=https://test-maestro.8020solutions.org/b/${SLUG}/"            >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_USE_ZCS_MOCK: 'false'
          NEXT_PUBLIC_USE_AUTH_MOCK: 'false'
          NEXT_PUBLIC_BASE_PATH: ${{ steps.target.outputs.base_path }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create webroot
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p ${{ steps.target.outputs.webroot }}"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            out/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ steps.target.outputs.webroot }}/

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}' | jq -r '.success // "purge-skipped"'

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.target.outputs.url }}" || echo "000")
          echo "→ HTTP ${STATUS} — ${{ steps.target.outputs.url }}"

      - name: Fetch issue AC
        id: ac
        if: github.ref_name != 'master' && github.ref_name != 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_N=$(echo "${{ github.ref_name }}" | grep -oP '(?<=issue-)\d+' || true)
          if [ -n "$ISSUE_N" ]; then
            BODY=$(gh issue view "$ISSUE_N" --repo "${{ github.repository }}" --json body -q '.body' 2>/dev/null || echo "")
            # Estrae righe AC, converte checkbox in emoji, unisce con \n letterale per Telegram
            AC=$(echo "$BODY" | \
              awk '/## Acceptance Criteria/{f=1;next} f&&/^##/{exit} f&&/- \[/{print}' | \
              head -10 | \
              sed 's/- \[x\]/☑/g' | sed 's/- \[ \]/☐/g' | \
              tr '\n' '|' | sed 's/|$//')
            echo "issue_n=$ISSUE_N" >> $GITHUB_OUTPUT
            echo "ac=$AC"          >> $GITHUB_OUTPUT
          fi

      - name: Notify
        if: always()
        run: |
          EMOJI=$([ "${{ job.status }}" = "success" ] && echo "✅" || echo "❌")
          SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          MSG="${EMOJI} maestroweb / ${{ github.ref_name }} (${SHORT})\n🔗 ${{ steps.target.outputs.url }}\nStatus: ${{ job.status }}"

          ISSUE_N="${{ steps.ac.outputs.issue_n }}"
          AC_RAW="${{ steps.ac.outputs.ac }}"
          if [ "${{ job.status }}" = "success" ] && [ -n "$ISSUE_N" ] && [ -n "$AC_RAW" ]; then
            AC_FMT=$(echo "$AC_RAW" | tr '|' '\n' | sed 's/^/  /' | tr '\n' '|' | sed 's/|/\\n/g' | sed 's/\\n$//')
            MSG="${MSG}\n\n🧪 AC da testare (Issue #${ISSUE_N}):\n${AC_FMT}"
          fi

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "ciccio-notify '${MSG}'" \
            || true
