name: 🔔 Notify Deploy Status

on:
  workflow_run:
    workflows: ["Build & Deploy", "Deploy BeachCRER Test"]
    types: [requested, in_progress, completed]

jobs:
  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          repository: ecologicaleaving/workflow

      - name: Extract metadata
        id: meta
        run: |
          REPO=$(echo "${{ github.repository }}" | sed 's/.*\///')
          BRANCH="${{ github.event.workflow_run.head_branch || 'main' }}"
          STATUS="in_progress"
          
          if [ "${{ github.event.action }}" == "completed" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
              STATUS="success"
            else
              STATUS="failed"
            fi
          fi
          
          echo "repo=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "link=${{ github.event.workflow_run.html_url }}" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/deploy-notify.py \
            "${{ steps.meta.outputs.repo }}" \
            "deploy" \
            "${{ steps.meta.outputs.status }}" \
            "${{ steps.meta.outputs.branch }}" \
            "${{ steps.meta.outputs.link }}"
