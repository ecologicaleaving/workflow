name: Sync Workflow Templates

# Propaga i template aggiornati a tutte le repo target
# Triggerato su push a main quando cambiano i file in templates/

on:
  push:
    branches: ['main', 'master']
    paths:
      - 'templates/**'
  workflow_dispatch:

jobs:
  sync:
    name: Sync templates to all repos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync templates via PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/safe-github.sh
          # Sync each template to the target repos opening a PR (mai commit diretto su main)
          for tpl in templates/*.yml; do
            scripts/safe-github.sh sync-template \
              --template "$tpl" \
              --repos "ecologicaleaving/finn,ecologicaleaving/StageConnect,ecologicaleaving/BeachRef-app,ecologicaleaving/maestro,ecologicaleaving/GridConnect,ecologicaleaving/AutoDrum,ecologicaleaving/smartscore" \
              || true
          done
